services:
   client:
      container_name: narutoquotes-client
      build:
         context: .
         dockerfile: docker/Dockerfile.client
      volumes:
         - ./packages/client:/app
         - /app/node_modules
      environment:
         VITE_API_URL: http://server:3000
      ports:
         - '5173:5173'
      depends_on:
         server:
            condition: service_healthy

   server:
      container_name: narutoquotes-server
      build:
         context: .
         dockerfile: docker/Dockerfile.server
      command: ['bun', 'dev']
      volumes:
         - ./packages/server:/app
         - /app/node_modules
      environment:
         DATABASE_URL: ${DATABASE_URL}
      ports:
         - '3000:3000'
      healthcheck:
         test: ['CMD', 'bun', '/healthcheck.ts']
         interval: 10s
         timeout: 5s
         retries: 5

      depends_on:
         database:
            condition: service_healthy

   database:
      container_name: narutoquotes-database
      image: postgres:18-alpine
      restart: unless-stopped
      volumes:
         - narutoquotes-volume:/var/lib/postgresql
      environment:
         POSTGRES_USER: ${POSTGRES_USER}
         POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
         POSTGRES_DB: ${POSTGRES_DB}
      healthcheck:
         test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
         interval: 10s
         timeout: 5s
         retries: 5
volumes:
   narutoquotes-volume:
      driver: local
